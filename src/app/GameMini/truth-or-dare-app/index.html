<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Dare App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>🎲 Truth or Dare</h1>
      <p class="subtitle">Chọn Thật hay Thách, rồi bấm để nhận câu hỏi ngẫu nhiên.</p>

      <div class="mode-buttons">
        <button id="truthBtn" class="active">Truth</button>
        <button id="dareBtn">Dare</button>
      </div>

      <div class="result-box">
        <p id="typeLabel">TRUTH</p>
        <h2 id="question">Bạn đã từng nói dối bạn thân chưa?</h2>
      </div>

      <button id="randomBtn" class="main-btn">Random câu mới</button>

      <div class="quick-actions">
        <button id="mixBtn">Random Truth/Dare</button>
        <button id="copyBtn">Copy câu này</button>
      </div>

      <p id="notice"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
