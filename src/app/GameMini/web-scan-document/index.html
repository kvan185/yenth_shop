<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Scan Document</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>📄 Web Scan Document</h1>
        <p>Scan tài liệu bằng camera hoặc ảnh, chỉnh sáng, đen trắng và xuất PDF.</p>
      </div>
    </header>

    <section class="panel controls">
      <button id="startCamera">Mở camera</button>
      <button id="capture" disabled>Chụp ảnh</button>
      <label class="fileBtn">
        Chọn ảnh
        <input type="file" id="fileInput" accept="image/*" hidden />
      </label>
      <button id="addPage" disabled>Thêm trang scan</button>
      <button id="downloadPDF" disabled>Xuất PDF</button>
    </section>

    <main class="grid">
      <section class="panel">
        <h2>Camera / Ảnh gốc</h2>
        <video id="video" autoplay playsinline></video>
        <canvas id="sourceCanvas"></canvas>
      </section>

      <section class="panel">
        <h2>Tuỳ chỉnh scan</h2>
        <div class="tools">
          <label>Sáng <input type="range" id="brightness" min="-80" max="120" value="20"></label>
          <label>Tương phản <input type="range" id="contrast" min="-80" max="120" value="35"></label>
          <label>Đen trắng <input type="checkbox" id="bw" checked></label>
          <label>Khổ PDF
            <select id="pageSize">
              <option value="a4">A4</option>
              <option value="letter">Letter</option>
            </select>
          </label>
        </div>
        <button id="process" disabled>Xử lý ảnh</button>
        <canvas id="resultCanvas"></canvas>
      </section>
    </main>

    <section class="panel">
      <h2>Danh sách trang</h2>
      <div id="pages" class="pages"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
