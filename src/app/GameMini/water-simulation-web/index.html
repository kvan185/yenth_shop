<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giả Lập Môi Trường Nước</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="waterCanvas"></canvas>

  <div class="panel">
    <div>
      <p class="label">Mini Web</p>
      <h1>Giả Lập Môi Trường Nước</h1>
      <p class="desc">Di chuyển chuột hoặc chạm màn hình để tạo sóng nước.</p>
    </div>

    <div class="controls">
      <button id="toggleFish">Ẩn/Hiện cá</button>
      <button id="toggleRain">Bật/Tắt mưa</button>
      <button id="themeBtn">Đổi màu nước</button>
    </div>
  </div>

  <div class="hint">Click / kéo chuột để tạo gợn sóng</div>

  <script src="script.js"></script>
</body>
</html>
