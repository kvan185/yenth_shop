<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Pet Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb1"></div><div class="bg-orb orb2"></div>
  <main class="app">
    <header>
      <div>
        <p class="eyebrow">Offline Web App</p>
        <h1>🐾 Virtual Pet</h1>
      </div>
      <button id="resetBtn" class="ghost">Reset</button>
    </header>

    <section class="hero card">
      <div class="pet-wrap">
        <div id="petMood" class="mood">Đang vui vẻ</div>
        <div id="pet" class="pet">🐶</div>
        <input id="petName" maxlength="18" placeholder="Đặt tên thú cưng" />
      </div>
      <div class="stats">
        <div class="level-row">
          <span>Level <b id="level">1</b></span>
          <span>XP <b id="xp">0</b>/100</span>
        </div>
        <div class="bar"><i id="xpBar"></i></div>
        <div class="stat"><span>Đói</span><div class="bar"><i id="hungerBar"></i></div><b id="hungerText"></b></div>
        <div class="stat"><span>Vui</span><div class="bar"><i id="happyBar"></i></div><b id="happyText"></b></div>
        <div class="stat"><span>Năng lượng</span><div class="bar"><i id="energyBar"></i></div><b id="energyText"></b></div>
        <div class="coins">🪙 Xu: <b id="coins">50</b></div>
      </div>
    </section>

    <section class="grid">
      <button class="action" data-act="feed">🍖 Cho ăn<br><small>-5 xu</small></button>
      <button class="action" data-act="play">🎾 Chơi<br><small>+XP</small></button>
      <button class="action" data-act="sleep">💤 Ngủ<br><small>hồi năng lượng</small></button>
      <button class="action" data-act="clean">🛁 Tắm<br><small>+vui</small></button>
    </section>

    <section class="card shop">
      <h2>Đổi thú cưng</h2>
      <div class="pets">
        <button data-pet="🐶">🐶 Chó</button><button data-pet="🐱">🐱 Mèo</button><button data-pet="🐰">🐰 Thỏ</button>
        <button data-pet="🐼">🐼 Gấu</button><button data-pet="🐲">🐲 Rồng</button><button data-pet="🦊">🦊 Cáo</button>
      </div>
    </section>

    <section class="card game">
      <h2>Mini Game: bắt sao</h2>
      <p>Bấm vào ngôi sao trước khi nó đổi vị trí để kiếm xu.</p>
      <div id="gameBox"><button id="star">⭐</button></div>
      <p id="message">Sẵn sàng!</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
