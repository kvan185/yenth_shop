<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ôn từ vựng B2</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div>
        <p class="eyebrow">VSTEP B2</p>
        <h1>Ôn từ vựng</h1>
      </div>

      <nav class="mode-tabs" aria-label="Chọn chế độ học">
        <button class="tab-button active" type="button" data-mode="learn">Học</button>
        <button class="tab-button" type="button" data-mode="quiz">Kiểm tra</button>
      </nav>

      <section class="stats-panel" aria-label="Tiến độ">
        <div>
          <span>Tổng từ</span>
          <strong id="totalWords">0</strong>
        </div>
        <div>
          <span>Đã xem</span>
          <strong id="seenWords">0</strong>
        </div>
        <div>
          <span>Điểm</span>
          <strong><span id="scoreCorrect">0</span>/<span id="scoreTotal">0</span></strong>
        </div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <label class="search-box">
          <span>Tìm từ</span>
          <input id="searchInput" type="search" placeholder="Nhập từ hoặc nghĩa..." />
        </label>
        <button id="shuffleButton" class="secondary-button" type="button">Trộn từ</button>
      </header>

      <section id="learnView" class="view active" aria-label="Học từ vựng">
        <div class="word-card">
          <div class="word-card-head">
            <div>
              <p id="wordIndex" class="eyebrow">Từ 0/0</p>
              <h2 id="wordText">Đang tải...</h2>
            </div>
            <span id="partOfSpeech" class="tag"></span>
          </div>

          <dl class="word-detail">
            <div>
              <dt>Nghĩa</dt>
              <dd id="meaningText"></dd>
            </div>
            <div>
              <dt>Ví dụ</dt>
              <dd id="exampleText"></dd>
            </div>
            <div>
              <dt>Dịch ví dụ</dt>
              <dd id="exampleMeaningText"></dd>
            </div>
          </dl>

          <div class="card-actions">
            <button id="previousButton" class="secondary-button" type="button">Trước</button>
            <button id="nextButton" class="primary-button" type="button">Tiếp theo</button>
          </div>
        </div>

        <div id="wordList" class="word-list" aria-label="Danh sách từ"></div>
      </section>

      <section id="quizView" class="view" aria-label="Kiểm tra từ vựng">
        <div class="quiz-card">
          <div class="quiz-head">
            <div>
              <h2 id="quizWord">Đang tải...</h2>
            </div>
            <button id="newQuestionButton" class="secondary-button" type="button">Câu khác</button>
          </div>

          <div id="answerOptions" class="answer-grid"></div>
          <p id="feedbackText" class="feedback" aria-live="polite"></p>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
