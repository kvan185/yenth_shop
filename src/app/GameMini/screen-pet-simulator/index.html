<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Pet Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>🐾 Screen Pet Simulator</h1>
        <p>Giả lập hoạt động sống cho pet trên màn hình</p>
      </div>
      <button id="themeBtn">Đổi cảnh</button>
    </header>

    <section class="stats">
      <div class="stat"><span>Đói</span><div><i id="hungerBar"></i></div><b id="hungerText">50%</b></div>
      <div class="stat"><span>Vui</span><div><i id="happyBar"></i></div><b id="happyText">80%</b></div>
      <div class="stat"><span>Năng lượng</span><div><i id="energyBar"></i></div><b id="energyText">70%</b></div>
      <div class="stat"><span>Sạch</span><div><i id="cleanBar"></i></div><b id="cleanText">90%</b></div>
    </section>

    <main id="room" class="room day">
      <div class="sun"></div>
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div id="message" class="message">Xin chào! Mình là Mochi 🐶</div>
      <div id="pet" class="pet walk">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="face">
          <div class="eye left-eye"></div>
          <div class="eye right-eye"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
        <div class="body"></div>
        <div class="tail"></div>
        <div class="leg l1"></div>
        <div class="leg l2"></div>
      </div>
      <div id="itemLayer"></div>
      <div class="floor"></div>
    </main>

    <section class="controls">
      <button data-action="feed">🍖 Cho ăn</button>
      <button data-action="play">🎾 Chơi</button>
      <button data-action="bath">🫧 Tắm</button>
      <button data-action="sleep">😴 Ngủ</button>
      <button data-action="dance">🎵 Nhảy</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
