<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo QR thanh toán MB Bank</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel form-panel">
      <div class="brand">
        <div class="logo">MB</div>
        <div>
          <h1>Tạo QR thanh toán MB Bank</h1>
          <p>Nhập số tiền và nội dung để sinh mã VietQR chuyển khoản.</p>
        </div>
      </div>

      <form id="qrForm">
        <label>
          Số tài khoản MB Bank
          <input id="accountNo" type="text" inputmode="numeric" placeholder="Ví dụ: 0123456789" required />
        </label>

        <label>
          Tên chủ tài khoản
          <input id="accountName" type="text" placeholder="Ví dụ: NGUYEN VAN A" />
        </label>

        <label>
          Số tiền (VND)
          <input id="amount" type="text" inputmode="numeric" placeholder="Ví dụ: 50000" required />
        </label>

        <label>
          Nội dung chuyển khoản
          <input id="addInfo" type="text" maxlength="50" placeholder="Ví dụ: THANH TOAN DON HANG 001" required />
        </label>

        <label>
          Mẫu QR
          <select id="template">
            <option value="compact2">compact2 - đầy đủ thông tin</option>
            <option value="compact">compact - gọn</option>
            <option value="qr_only">qr_only - chỉ QR</option>
            <option value="print">print - in ấn</option>
          </select>
        </label>

        <button type="submit">Tạo mã QR</button>
      </form>
    </section>

    <section class="panel result-panel">
      <h2>Mã QR thanh toán</h2>
      <div class="qr-box">
        <img id="qrImage" alt="QR thanh toán MB Bank" />
        <p id="placeholder">QR sẽ hiển thị ở đây sau khi bạn nhập thông tin.</p>
      </div>

      <div class="actions">
        <button id="copyBtn" type="button" disabled>Copy link QR</button>
        <a id="openBtn" class="link-button disabled" href="#" target="_blank" rel="noopener">Mở ảnh QR</a>
      </div>

      <div class="info-card">
        <p><strong>Ngân hàng:</strong> MB Bank</p>
        <p><strong>BIN:</strong> 970422</p>
        <p><strong>Link QR:</strong></p>
        <textarea id="qrLink" readonly></textarea>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
